# 長期記憶(LangMem)を永続化する PostgreSQL。
# pgvector 拡張入りイメージを使う(意味検索の埋め込みベクトルを格納するため)。
# 起動:  docker compose up -d
# 接続:  postgresql://agent:agent@localhost:5432/agent
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agent-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
